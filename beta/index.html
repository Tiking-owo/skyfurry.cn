<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风羽阁 SkyFurry - 星河兽痕</title>
    <link rel="icon" type="image/png" href="https://www.skyfurry.cn/skyfurry.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'SF Mono', Monaco, monospace;
            background: #000;
            color: #00ff00;
            overflow: hidden;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            cursor: default;
        }

        /* CRT 显像管效果 */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0.1) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .crt-scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 11;
            animation: scanline 8s linear infinite;
        }

        .crt-flicker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.02);
            pointer-events: none;
            z-index: 12;
            animation: flicker 0.1s infinite;
        }

        .crt-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 300px rgba(0, 255, 0, 0.1);
            pointer-events: none;
            z-index: 9;
        }

        /* 开场遮罩 */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .crt-logo {
            width: 120px;
            height: 120px;
            /* background: #00ff00; */
            border-radius: 50%;
            margin-bottom: 40px;
            position: relative;
            /* box-shadow: 
                0 0 20px #00ff00,
                0 0 40px rgba(0, 64, 255, 0.5),
                inset 0 0 20px rgba(0, 0, 0, 0.5); */
            animation: crt-pulse 3s infinite;
        }

        .crt-logo::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 7px solid rgb(53, 119, 190);
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(3, 200, 255, 0.545);
        }

        .crt-text {
            font-size: 2.5rem;
            /* text-transform: uppercase; */
            letter-spacing: 0.3rem;
            margin-bottom: 40px;
            color: #02f8cf;
            text-shadow: 
                0 0 5px #017fa9,
                0 0 10px rgba(0, 26, 255, 0.5);
            position: relative;
        }

        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch::before {
            left: 2px;
            color: #ff3b00;
            text-shadow: -2px 0 #ff3b00;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            color: #00a1d6;
            text-shadow: 2px 0 #00a1d6;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 2s infinite linear alternate-reverse;
        }

        /* 进度条 */
        .crt-progress {
            width: 300px;
            height: 4px;
            background: rgba(99, 33, 223, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 30px 0;
            border: 1px solid rgba(200, 255, 0, 0.3);
            box-shadow: 
                0 0 5px rgba(0, 255, 0, 0.3),
                inset 0 0 5px rgba(0, 255, 0, 0.1);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ff0000;
            box-shadow: 0 0 10px #00ff00;
            transition: width 2s ease;
        }

        .press-text {
            font-size: 1rem;
            color: #ff0000;
            text-shadow: 0 0 5px #00ff00;
            animation: crt-flicker-text 2s infinite;
        }

        /* 终端界面 */
        #terminal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            color: #00ff91;
            padding: 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            overflow: hidden;
            z-index: 30;
            display: none;
            text-shadow: 0 0 3px #00ffa6;
        }

        .terminal-content {
            max-width: 800px;
            margin: 0 auto;
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .terminal-content::-webkit-scrollbar {
            display: none;
        }

        .terminal-line {
            margin-bottom: 15px;
            opacity: 0;
            animation: terminal-type 0.1s forwards;
            line-height: 1.6;
        }

        .prompt {
            color: #00ffff;
        }

        .error {
            color: #ff0066;
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 0, 102, 0.5);
        }

        .success {
            color: #00ff66;
        }

        .warning {
            color: #ffcc00;
        }

        /* 主页面 */
        #main-content {
            display: none;
            height: 100vh;
            background: 
                radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 70%),
                repeating-linear-gradient(45deg, #0a0a0a 0px, #0a0a0a 1px, #1a1a1a 1px, #1a1a1a 2px);
            position: relative;
            overflow: hidden;
        }

        /* 导航栏 */
        .crt-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 40;
            border-bottom: 1px solid rgba(0, 255, 225, 0.611);
            box-shadow: 0 2px 10px rgba(0, 234, 255, 0.533);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #5896a1;
            text-shadow: 0 0 5px #fdffff7a;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-link {
            color: #5896a1;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            transition: all 0.3s ease;
            text-shadow: 0 0 3px #5896a1;
        }

        .nav-link:hover {
            background: rgba(0, 242, 255, 0.364);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        /* 主内容 */
        .main-section {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            max-width: 800px;
            z-index: 35;
        }

        .crt-logo {
            width: 120px;
            height: 120px;
            /* background: #00ff00; */
            border-radius: 50%;
            margin-bottom: 40px;
            position: relative;
            /* box-shadow: 
                0 0 20px #00ff00,
                0 0 40px rgba(0, 64, 255, 0.5),
                inset 0 0 20px rgba(0, 0, 0, 0.5); */
            animation: crt-pulse 3s infinite;
        }

        .crt-logo::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 7px solid rgb(53, 119, 190);
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(3, 200, 255, 0.545);
        }

        .main-logo {
            width: 150px;
            height: 150px;
            /* background: #00ff00; */
            border-radius: 50%;
            margin: 0 auto 30px;
            /* box-shadow: 
                0 0 30px #00ff00,
                0 0 60px rgba(0, 255, 0, 0.4); */
            animation: crt-glow 4s infinite alternate;
            position: relative;
        }

        .main-logo::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 7px solid rgb(53, 119, 190);
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(3, 200, 255, 0.545);
        }

        .event-title {
            font-size: 3rem;
            color: #57bad8;
            text-shadow: 
                0 0 10px #0062ff,
                0 0 20px rgba(0, 4, 255, 0.4);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .event-info {
            color: #00a2ff;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid rgba(0, 162, 255, 0.2);
            box-shadow: 
                0 0 20px rgba(0, 162, 255, 0.1),
                inset 0 0 20px rgba(0, 162, 255, 0.05);
        }

        .cta-button {
            display: inline-block;
            padding: 15px 35px;
            background: rgba(0, 162, 255, 0.2);
            color: #00a2ff  ;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 162, 255, 0.4);
            text-shadow: 0 0 3px #00a2ff;
            box-shadow: 0 0 10px rgba(0, 162, 255, 0.2);
        }

        .cta-button:hover {
            background: rgba(0, 162, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.4);
            transform: translateY(-2px);
        }

        /* 底部备案 */
        .crt-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #00c3ff;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 40;
            /* text-shadow: 0 0 3px #00a2ff; */
        }

        .crt-footer a {
            text-decoration: none;
            color: #00c3ff;
        }

        /* 欢迎弹窗 */
        .welcome-toast {
            position: fixed;
            top: 120px;
            right: 20px;
            background: rgba(0, 162, 255, 0.2);
            color: #00ffee;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.5s ease;
            border: 1px solid rgba(0, 255, 234, 0.447);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.308);
            text-shadow: 0 0 3px #00ffcc;
        }

        .welcome-toast.show {
            transform: translateX(0);
        }

        /* 雪花屏效果 */
        .snow-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 50;
            display: none;
            pointer-events: none;
        }

         .beian {
            height: 1rem;
            vertical-align: middle;
            margin: 0 2px;
            margin-bottom: 6px;
        }

        /* 动画关键帧 */
        @keyframes crt-pulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 
                    0 0 20px #01166b,
                    0 0 40px rgba(34, 45, 255, 0.5);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 
                    0 0 30px #0d34e4,
                    0 0 60px rgba(99, 187, 255, 0.7);
            }
        }

        @keyframes crt-glow {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 
                    0 0 20px #01166b,
                    0 0 40px rgba(34, 45, 255, 0.5);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 
                    0 0 30px #0d34e4,
                    0 0 60px rgba(99, 187, 255, 0.7);
            }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
        }

        @keyframes crt-flicker-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes terminal-type {
            to { opacity: 1; }
        }

        @keyframes glitch-anim {
            0% { clip: rect(42px, 9999px, 44px, 0); }
            20% { clip: rect(12px, 9999px, 59px, 0); }
            40% { clip: rect(48px, 9999px, 29px, 0); }
            60% { clip: rect(42px, 9999px, 73px, 0); }
            80% { clip: rect(63px, 9999px, 27px, 0); }
            100% { clip: rect(34px, 9999px, 55px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(52px, 9999px, 74px, 0); }
            40% { clip: rect(79px, 9999px, 85px, 0); }
            60% { clip: rect(75px, 9999px, 5px, 0); }
            80% { clip: rect(67px, 9999px, 61px, 0); }
            100% { clip: rect(14px, 9999px, 79px, 0); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .crt-text {
                font-size: 2rem;
                letter-spacing: 0.2rem;
            }
            
            .event-title {
                font-size: 2.2rem;
            }
            
            .main-logo {
                width: 120px;
                height: 120px;
            }
            
            .event-info {
                font-size: 1rem;
                padding: 20px;
            }
            
            .nav-links {
                gap: 15px;
            }
            
            .nav-link {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
            
            .crt-nav {
                padding: 15px 20px;
            }
            
            .terminal-content {
                padding: 20px;
                font-size: 1rem;
            }
            
            .crt-progress {
                width: 250px;
            }
        }

        @media (max-width: 480px) {
            .crt-text {
                font-size: 1.5rem;
            }
            
            .event-title {
                font-size: 1.8rem;
            }
            
            .crt-logo {
                width: 80px;
                height: 80px;
            }
            
            .nav-links {
                flex-direction: column;
                gap: 10px;
            }
            
            .cta-button {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- CRT 显像管效果层 -->
    <div class="crt-overlay"></div>
    <div class="crt-scanlines"></div>
    <div class="crt-flicker"></div>
    <div class="crt-glow"></div>

    <!-- 开场遮罩 -->
    <div id="splash-screen">
        <div class="crt-logo"></div>
        <div class="crt-text">
            <span class="glitch" data-text="风羽阁">SkyFurry®</span>
        </div>
        <div class="crt-progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="press-text">长按接入系统</div>
    </div>

    <!-- 终端界面 -->
    <div id="terminal">
        <div class="terminal-content" id="terminal-content">
            <!-- 终端内容将通过JS动态添加 -->
        </div>
    </div>

    <!-- 主页面 -->
    <div id="main-content">
        <nav class="crt-nav">
            <div class="nav-logo">SkyFurry®</div>
            <div class="nav-links">
                <a href="#" class="nav-link">首页</a>
                <a href="#" class="nav-link">活动</a>
                <a href="#" class="nav-link">关于</a>
                <a href="#" class="nav-link">联系</a>
            </div>
        </nav>

        <div class="main-section">
            <div class="main-logo"></div>
            <h1 class="event-title">SkyFurry® - 02</h1>
            <div class="event-info">
                <p>🕒时间：xxxx年xx月xx-xx日</p>
                <p>📍地点：风羽阁星际</p>
                <p>一场属于Furry星际盛宴，穿越星河，留下属于你的兽痕！</p>
                <p>owo</p>
            </div>
            <a href="#" class="cta-button" id="cta-button">立即购票</a>
        </div>

        <div class="crt-footer">
            © <span id="current-year">2025</span> SkyFurry 保留所有权利 | 
        <a class="xa" href="https://beian.miit.gov.cn/">浙ICP备2025148805号-1</a> |
        <img class="beian" src="https://beian.mps.gov.cn/img/logo01.dd7ff50e.png" alt="备案图标">
        <a class="xa" href="https://beian.mps.gov.cn/#/query/webSearch?code=33018302001830" rel="noreferrer" target="_blank">浙公网安备33018302001830号</a> |
        <a class="xa" href="https://icp.gov.moe/?keyword=20242556">萌ICP备20242556号</a>

        </div>
    </div>

    <!-- 欢迎弹窗 -->
    <div class="welcome-toast" id="welcome-toast">欢迎回来，探索者！</div>

    <!-- 雪花屏 -->
    <div class="snow-screen" id="snow-screen"></div>

    <script>
        // 检查访问状态
        const hasVisited = localStorage.getItem('hasVisited');
        const welcomeToast = document.getElementById('welcome-toast');

        if (hasVisited) {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            setTimeout(() => {
                welcomeToast.classList.add('show');
                setTimeout(() => welcomeToast.classList.remove('show'), 3000);
            }, 1000);
        } else {
            setupFirstVisit();
        }

        function setupFirstVisit() {
            let pressTimer;
            const progressBar = document.getElementById('progress-bar');
            const splashScreen = document.getElementById('splash-screen');

            // 长按事件
            splashScreen.addEventListener('mousedown', startPress);
            splashScreen.addEventListener('touchstart', startPress);
            splashScreen.addEventListener('mouseup', cancelPress);
            splashScreen.addEventListener('mouseleave', cancelPress);
            splashScreen.addEventListener('touchend', cancelPress);

            function startPress(e) {
                e.preventDefault();
                progressBar.style.width = '100%';
                pressTimer = setTimeout(startTerminalSequence, 2000);
            }

            function cancelPress() {
                clearTimeout(pressTimer);
                progressBar.style.width = '0%';
            }

            async function startTerminalSequence() {
                splashScreen.style.display = 'none';
                const terminal = document.getElementById('terminal');
                const terminalContent = document.getElementById('terminal-content');
                
                // 清空终端内容
                terminalContent.innerHTML = '';
                terminal.style.display = 'block';

                // 终端对话序列
                const dialogues = [
                    { text: "> 正在初始化系统接口...", delay: 800, class: "prompt" },
                    { text: "> 连接到SkyFurry服务器...", delay: 800, class: "prompt" },
                    { text: "> 验证访问权限...", delay: 800, class: "prompt" },
                    { text: "> 错误: 安全协议冲突 [CODE: 0x7B]", delay: 1000, class: "error" },
                    { text: "> 警告: 检测到异常信号", delay: 800, class: "warning" },
                    { text: "> 警告: 系统完整性校验失败", delay: 800, class: "warning" },
                    { text: "> 启动应急协议...", delay: 1000, class: "prompt" },
                    { text: "> 正在建立安全连接...", delay: 800, class: "prompt" },
                    { text: "> 连接成功! 欢迎访问SkyFurry", delay: 1200, class: "success" }
                ];

                for (const dialogue of dialogues) {
                    await addTerminalLine(dialogue.text, dialogue.class, dialogue.delay);
                }

                // 显示雪花屏1秒
                await showSnowScreen(1000);
                
                // 直接进入主页面
                terminal.style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                
                // 设置访问记录
                // localStorage.setItem('hasVisited', 'true');
                
                // 显示欢迎弹窗
                setTimeout(() => {
                    welcomeToast.classList.add('show');
                    setTimeout(() => welcomeToast.classList.remove('show'), 3000);
                }, 1000);
            }
        }

        async function addTerminalLine(text, className, delay) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = `terminal-line ${className}`;
                    line.textContent = text;
                    document.getElementById('terminal-content').appendChild(line);
                    line.scrollIntoView({ behavior: 'smooth' });
                    resolve();
                }, delay);
            });
        }

        async function showSnowScreen(duration) {
            const snowScreen = document.getElementById('snow-screen');
            snowScreen.style.display = 'block';
            return new Promise(resolve => {
                setTimeout(() => {
                    snowScreen.style.display = 'none';
                    resolve();
                }, duration);
            });
        }

        // CTA按钮动画
        document.getElementById('cta-button').addEventListener('click', function(e) {
            e.preventDefault();
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
                // 添加页面跳转逻辑
                alert('还没有完成owo');
            }, 150);
        });

        // 移动端触摸优化
        document.addEventListener('touchstart', function() {}, { passive: true });
    </script>
</body>
</html>
